<!DOCTYPE html>
<html>
<head>
<title>NicheArtists</title>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/pictures/gage.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
body, h1,h2,h3,h4,h5,h6 {font-family: "Montserrat", sans-serif}
.w3-row-padding img {margin-bottom: 12px}
/* Set the width of the sidebar to 120px */
.w3-sidebar {width: 120px;background: #222;}
/* Add a left margin to the "page content" that matches the width of the sidebar (120px) */
#main {margin-left: 120px}
/* Remove margins from "page content" on small screens */
@media only screen and (max-width: 600px) {#main {margin-left: 0}}
body {
  background-color: #474064;
  background-image: 
    radial-gradient(at 0% 0%, rgb(113, 39, 192) 0, transparent 70%), 
    radial-gradient(at 100% 100%, rgb(159, 56, 75) 0, transparent 70%);
  min-height: 100vh;
}
footer {
  background: transparent;
}
</style>
</head>
<body>

<!-- Page Content -->
<div class="w3-padding-large" id="main">
  <!-- Header/Home -->
  <header class="w3-container w3-padding-32 w3-center" id="home">
    <a href="/index">
    <img src="pictures/logofull.png" alt="Logo" style="width:40%; height:auto;">
    </a>
    <p>The Website to find your match with an underdog musician.</p>
  </header>

  <!-- About Section -->
  <div class="w3-content w3-justify w3-text-grey w3-padding-64" id="about">
    <form id="createAccountForm">
    <input type="email" id="create-email" name="email" placeholder="Email"><br><br>
    <input type="password" id="create-password" name="password" placeholder="Password"><br><br>
    <input type="submit" value="Create Account">
    </form>
  <br><br><br><br>
    <form id="signInForm">
    <input type="email" id="sign-email" name="email" placeholder="Email"><br><br>
    <input type="password" id="sign-password" name="password" placeholder="Password"><br><br>
    <input type="submit" value="Sign In">
    </form>
    <div id="output"></div>
    <br><br><br><br>
    <button class="w3-button w3-light-grey w3-padding-large w3-section" id="logoutButton">
      <i class="fa fa-download"></i> Log Out
    </button>
  </div>
    
  
  
    <!-- Footer -->
  <footer class="w3-content w3-padding-64 w3-text-grey w3-xlarge">
    <i class="fa fa-facebook-official w3-hover-opacity"></i>
    <i class="fa fa-instagram w3-hover-opacity"></i>
    <i class="fa fa-snapchat w3-hover-opacity"></i>
    <i class="fa fa-pinterest-p w3-hover-opacity"></i>
    <i class="fa fa-twitter w3-hover-opacity"></i>
    <i class="fa fa-linkedin w3-hover-opacity"></i>
  <!-- End footer -->
  </footer>

<!-- END PAGE CONTENT -->
</div>

<script src="/script.js"></script>
</body>
</html>
